<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ismael Asumanu Prince — Graphic Designer</title>
    <meta name="description" content="Ismael Asumanu Prince — Graphic Designer and Brand Identity Designer based in Ghana.">
    <meta name="author" content="Ismael Asumanu Prince">
    <meta property="og:title" content="Ismael Asumanu Prince — Graphic Designer">
    <meta property="og:description" content="Graphic Designer and Brand Identity Designer based in Ghana.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mawuliprince.github.io/my-portfolio/">
    <meta property="og:image" content="https://mawuliprince.github.io/my-portfolio/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ismael Asumanu Prince — Graphic Designer">
    <meta name="twitter:description" content="Graphic Designer and Brand Identity Designer based in Ghana.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000'/><text y='.9em' font-size='80' font-family='serif' fill='%23ff4500'>P</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html { scroll-behavior: smooth; }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(14px, 2.5vw, 22px) clamp(20px, 4vw, 40px);
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #000;
            transition: background 0.3s, color 0.3s, box-shadow 0.3s;
            z-index: 100;
            box-shadow: 0 1px 0 rgba(0,0,0,0.08);
        }

        body.dark header {
            background: rgba(0,0,0,0.88);
            color: #fff;
            box-shadow: 0 1px 0 rgba(255,255,255,0.06);
        }

        /* Transparent header when at top of hero */
        header.at-top {
            background: transparent;
            box-shadow: none;
            color: #fff;
        }

        .logo {
            color: #ff4500;
            font-size: clamp(18px, 2vw + 0.5rem, 24px);
            font-weight: 700;
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 16px);
        }

        .theme-toggle, .hamburger {
            font-size: clamp(16px, 2vw + 0.3rem, 20px);
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
            transition: color 0.2s, transform 0.2s;
            padding: 8px;
            border-radius: 50%;
            line-height: 1;
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px;
        }

        .theme-toggle:hover, .hamburger:hover { color: #ff4500; }
        .hamburger:active { transform: scale(0.9); }

        /* Hamburger icon swap */
        .hamburger .fa-bars  { display: block; }
        .hamburger .fa-times { display: none; }
        .hamburger.open .fa-bars  { display: none; }
        .hamburger.open .fa-times { display: block; }

        /* ── MENU BACKDROP ── */
        .menu-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 98;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .menu-backdrop.open {
            opacity: 1;
            pointer-events: all;
        }

        /* ── MENU ── */
        .menu {
            position: fixed;
            top: 0; right: -100%;
            width: min(300px, 85vw);
            height: 100vh;
            background: #fff;
            color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
            box-shadow: -8px 0 32px rgba(0,0,0,0.15);
        }

        .menu.open { right: 0; }

        body.dark .menu {
            background: #111;
            color: #fff;
            box-shadow: -8px 0 32px rgba(0,0,0,0.5);
        }

        .menu ul { list-style: none; text-align: center; width: 100%; padding: 0 2rem; }

        .menu li { margin: 6px 0; }

        .menu a {
            color: inherit;
            text-decoration: none;
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 500;
            display: block;
            padding: 14px 20px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .menu a:hover, .menu a:active {
            color: #ff4500;
            background: rgba(255,69,0,0.06);
        }

        /* Active nav item */
        .menu a.active { color: #ff4500; font-weight: 700; }

        /* Menu divider line */
        .menu-divider {
            width: 40px; height: 2px;
            background: #ff4500;
            margin: 1.5rem auto;
        }

        .menu-footer {
            position: absolute;
            bottom: 2.5rem;
            font-size: 0.7rem;
            color: #aaa;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ── HERO ── */
        #home {
            position: relative;
            width: 100%; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        .bg-video {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            display: block;
        }

        .text-container {
            background: transparent;
            padding: clamp(20px, 3vw, 40px) clamp(24px, 4vw, 56px);
            border-left: 3px solid #ff4500;
            z-index: 2;
            max-width: 90%;
            text-align: left;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(34px, 5.5vw + 1rem, 62px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .hero h1.visible { opacity: 1; transform: translateY(0); }

        .hero p {
            font-size: clamp(11px, 1.3vw + 0.2rem, 15px);
            color: #ffffff85;
            margin-top: 16px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease 0.25s, transform 0.8s ease 0.25s;
        }

        .hero p.visible { opacity: 1; transform: translateY(0); }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0;
            animation: fadeInUp 1s ease 1.5s forwards;
            cursor: pointer;
        }

        .scroll-indicator span {
            font-size: 0.62rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #ffffff60;
        }

        .scroll-indicator i {
            color: #ff4500;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ── SEPARATOR ── */
        .separator { width: 100%; height: 1px; background: #222; }

        /* ── FOOTER ── */
        footer {
            padding: clamp(40px, 6vw, 60px) clamp(20px, 4vw, 40px);
            background: #000;
            color: #fff;
            text-align: left;
            transition: background 0.3s, color 0.3s;
            position: relative;
        }

        body.dark footer { background: #fff; color: #000; }

        footer h2 {
            font-size: clamp(26px, 4vw, 36px);
            font-weight: 700;
        }

        .underline {
            width: clamp(60px, 8vw, 100px);
            height: 2px;
            background: #ff4500;
            margin: 10px 0 20px;
        }

        footer p {
            font-size: clamp(14px, 1.5vw + 0.3rem, 16px);
            color: #aaa;
            max-width: 520px;
            margin-bottom: clamp(24px, 4vw, 40px);
            line-height: 1.7;
            transition: color 0.3s;
        }

        body.dark footer p { color: #555; }

        .social-icons {
            display: flex;
            gap: clamp(12px, 2vw, 20px);
            align-items: center;
            flex-wrap: wrap;
        }

        .social-icon {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
        }

        .social-icon:hover {
            color: #ff4500;
            border-color: #ff4500;
            transform: translateY(-3px);
        }

        body.dark .social-icon { color: #000; border-color: #ccc; }
        body.dark .social-icon:hover { color: #ff4500; border-color: #ff4500; }

        .go-to-top {
            position: absolute;
            right: clamp(20px, 4vw, 40px);
            bottom: clamp(30px, 5vw, 50px);
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #ff4500;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-size: 16px;
        }

        .go-to-top:hover { transform: translateY(-3px); background: #e03a00; }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            footer { text-align: center; }
            footer p { max-width: 100%; }
            .social-icons { justify-content: center; }
            .go-to-top {
                position: relative;
                right: auto; bottom: auto;
                margin: 2rem auto 0;
            }
        }
    </style>
</head>
<body class="light">

    <!-- Backdrop (closes menu when tapped outside) -->
    <div class="menu-backdrop" id="menu-backdrop" onclick="closeMenu()"></div>

    <!-- HEADER -->
    <header id="site-header">
        <a href="index.html" class="logo">Prince</a>
        <div class="nav-icons">
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                <i class="fas fa-lightbulb"></i>
            </button>
            <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Open menu">
                <i class="fas fa-bars"></i>
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- MENU -->
    <nav class="menu" id="menu">
        <div class="menu-divider"></div>
        <ul>
            <li><a href="index.html"    class="active" onclick="closeMenu()">Home</a></li>
            <li><a href="about.html"    onclick="closeMenu()">About</a></li>
            <li><a href="projects.html" onclick="closeMenu()">Projects</a></li>
            <li><a href="#contact"      onclick="closeMenu()">Contact</a></li>
        </ul>
        <p class="menu-footer">© <span id="menu-year"></span> Prince</p>
    </nav>

    <!-- HERO -->
    <section id="home" class="hero">
        <!--
        BACKGROUND — uncomment ONE:

        IMAGE:  <img class="bg-video" src="your-image.jpg" alt="bg"/>

        VIDEO:  <video autoplay muted loop playsinline class="bg-video">
                    <source src="your-video.mp4" type="video/mp4">
                </video>
        -->
        <div class="text-container">
            <h1 id="hero-name">Ismael Asumanu <span style="color:#ff4500;">Prince</span></h1>
            <p id="hero-role">Graphic Designer &nbsp;·&nbsp; Brand Identity Designer</p>
        </div>

        <div class="scroll-indicator" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">
            <span>Scroll</span>
            <i class="fas fa-chevron-down"></i>
        </div>
    </section>

    <div class="separator"></div>

    <!-- FOOTER / CONTACT -->
    <footer id="contact">
        <h2>Let's Connect</h2>
        <div class="underline"></div>
        <p id="footer-desc">Ready to start your next project or want to collaborate? I'm always open to new opportunities.</p>
        <div class="social-icons">
            <a href="#" class="social-icon" id="social-email"    title="Email"><i class="fas fa-envelope"></i></a>
            <a href="#" class="social-icon" id="social-linkedin" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" class="social-icon" id="social-dribbble" title="Dribbble"><i class="fab fa-dribbble"></i></a>
            <a href="#" class="social-icon" id="social-instagram" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon" id="social-behance"  title="Behance"><i class="fab fa-behance"></i></a>
        </div>
        <div class="go-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">
            <i class="fas fa-arrow-up"></i>
        </div>
    </footer>

    <script>
        // ── YEAR ──────────────────────────────────────────
        document.getElementById('menu-year').textContent = new Date().getFullYear();

        // ── THEME ─────────────────────────────────────────
        function toggleTheme() {
            const isDark = document.body.classList.contains('dark');
            document.body.classList.toggle('dark', !isDark);
            document.body.classList.toggle('light', isDark);
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        // Restore saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.className = savedTheme;

        // ── MENU ──────────────────────────────────────────
        const menu       = document.getElementById('menu');
        const backdrop   = document.getElementById('menu-backdrop');
        const hamburger  = document.getElementById('hamburger');

        function openMenu() {
            menu.classList.add('open');
            backdrop.classList.add('open');
            hamburger.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            menu.classList.remove('open');
            backdrop.classList.remove('open');
            hamburger.classList.remove('open');
            document.body.style.overflow = '';
        }

        function toggleMenu() {
            menu.classList.contains('open') ? closeMenu() : openMenu();
        }

        // Close on Escape key
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeMenu();
        });

        // Swipe left to close menu on touch devices
        let touchStartX = 0;
        menu.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        menu.addEventListener('touchend', e => {
            if (e.changedTouches[0].clientX - touchStartX > 60) closeMenu();
        }, { passive: true });

        // ── TRANSPARENT HEADER AT TOP ─────────────────────
        const siteHeader = document.getElementById('site-header');

        function handleScroll() {
            if (window.scrollY < 60) {
                siteHeader.classList.add('at-top');
            } else {
                siteHeader.classList.remove('at-top');
            }
        }

        window.addEventListener('scroll', handleScroll, { passive: true });
        handleScroll(); // Run on load

        // ── HERO ANIMATION ────────────────────────────────
        // Trigger immediately on load (don't wait for scroll)
        window.addEventListener('load', () => {
            document.querySelectorAll('.hero h1, .hero p').forEach(el => {
                el.classList.add('visible');
            });
        });

        // ── CMS DATA ──────────────────────────────────────
        const SITE_DATA_URL = 'https://raw.githubusercontent.com/MawuliPRINCE/my-portfolio/main/site-home.json';

        fetch(SITE_DATA_URL + '?t=' + Date.now())
          .then(r => r.ok ? r.json() : null)
          .then(d => {
            if (!d) return;

            // Name
            const h1 = document.getElementById('hero-name');
            if (d.name && h1) {
                const name  = d.name.trim();
                const idx   = name.lastIndexOf(' ');
                const first = idx > -1 ? name.slice(0, idx) : '';
                const last  = idx > -1 ? name.slice(idx + 1) : name;
                h1.innerHTML = (first ? first + '<br>' : '') + '<span style="color:#ff4500;">' + last + '</span>';
            }

            // Role
            const role = document.getElementById('hero-role');
            if (d.role && role) role.textContent = d.role;

            // Footer description
            if (d.contactDesc) document.getElementById('footer-desc').textContent = d.contactDesc;

            // Social links
            const map = {
                'social-email':    d.email    ? 'mailto:' + d.email : null,
                'social-linkedin': d.linkedin || null,
                'social-dribbble': d.dribbble || null,
                'social-instagram':d.instagram|| null,
                'social-behance':  d.behance  || null,
            };
            Object.entries(map).forEach(([id, href]) => {
                if (href) document.getElementById(id).href = href;
            });

            // Hero background
            if (d.heroBg) {
                const hero   = document.getElementById('home');
                const existing = hero.querySelector('.bg-video');
                if (existing) existing.remove();

                hero.style.backgroundColor = 'transparent';

                const isVid = /\.(mp4|webm|mov|ogg)(\?|$)/i.test(d.heroBg) || d.heroBg.includes('/video/upload/');
                let media;

                if (isVid) {
                    media = document.createElement('video');
                    media.muted = true;
                    media.autoplay = true;
                    media.loop = true;
                    media.setAttribute('muted','');
                    media.setAttribute('autoplay','');
                    media.setAttribute('loop','');
                    media.setAttribute('playsinline','');
                    media.setAttribute('preload','auto');
                    const src = document.createElement('source');
                    src.src  = d.heroBg;
                    src.type = 'video/mp4';
                    media.appendChild(src);
                    media.src = d.heroBg;
                } else {
                    media = document.createElement('img');
                    media.alt = '';
                    media.src = d.heroBg.replace('/upload/', '/upload/q_auto,f_auto/');
                }

                media.className = 'bg-video';
                hero.insertBefore(media, hero.firstChild);

                // Dark overlay
                if (!hero.querySelector('.hero-overlay-dynamic')) {
                    const ov = document.createElement('div');
                    ov.className = 'hero-overlay-dynamic';
                    ov.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:1;pointer-events:none;';
                    hero.insertBefore(ov, hero.children[1]);
                }

                if (isVid) { media.load(); media.play().catch(()=>{}); }
            }
          })
          .catch(() => {});
    </script>
</body>
</html>
