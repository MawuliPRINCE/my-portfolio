<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince | Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

    <div class="flex flex-col lg:flex-row min-h-screen">

        <!-- RECENTS -->
        <div class="w-full lg:w-[35%] xl:w-[30%] h-[50vh] lg:h-screen sticky lg:top-0 bg-black text-white flex flex-col relative" onmouseenter="stopAutoSlide()" onmouseleave="startAutoSlide()">
            <div class="p-6 border-b border-gray-800 font-bold tracking-wider text-xl uppercase bg-black/50 backdrop-blur-sm">Recents</div>
            <div id="recents-container" class="flex-1 relative overflow-hidden bg-gray-900 flex items-center justify-center">
                <div id="recents-loading" class="spinner"></div>
            </div>
            <button onclick="prevRecent()" class="absolute left-4 top-1/2 -translate-y-1/2 p-3 bg-black/50 hover:bg-white/20 rounded-full backdrop-blur-sm z-10"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
            <button onclick="nextRecent()" class="absolute right-4 top-1/2 -translate-y-1/2 p-3 bg-black/50 hover:bg-white/20 rounded-full backdrop-blur-sm z-10"><i data-lucide="chevron-right" class="w-6 h-6"></i></button>
            <div id="recents-dots" class="absolute bottom-8 left-0 right-0 flex justify-center gap-3 z-10"></div>
            <div class="absolute top-0 left-0 h-1 bg-white/30 w-full z-20"><div id="progress-bar" class="h-full bg-white transition-all duration-5000 ease-linear w-0"></div></div>
        </div>

        <!-- PROJECTS -->
        <div class="flex-1 flex flex-col">
            <!-- HEADER WITH BACK ARROW -->
            <div class="sticky top-0 bg-white/95 dark:bg-zinc-950/95 backdrop-blur border-b border-gray-100 dark:border-zinc-800 p-6 flex items-center justify-between gap-4 z-30">
                <h1 class="text-2xl font-bold tracking-wider uppercase">Projects</h1>
                <div id="filter-container" class="flex gap-3 overflow-x-auto no-scrollbar flex-1 justify-end"></div>
                
                <!-- Back Arrow to Main Portfolio -->
                <a href="https://your-main-portfolio-url.com" class="p-3 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 border border-gray-200 dark:border-zinc-700">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
                
                <!-- Theme Toggle -->
                <button onclick="toggleTheme()" class="p-3 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 border border-gray-200 dark:border-zinc-700">
                    <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Projects List -->
            <div id="projects-list" class="px-6 py-12 max-w-5xl mx-auto w-full flex flex-col gap-16"></div>
            <div class="py-12 text-center text-sm uppercase tracking-widest text-gray-400">End of list</div>
        </div>
    </div>

    <!-- MODAL WITH BACK LINK INSIDE -->
    <div id="project-modal" class="fixed inset-0 z-50 bg-white dark:bg-zinc-950 hidden flex-col overflow-y-auto">
        <div class="sticky top-0 bg-white/90 dark:bg-zinc-950/90 backdrop-blur border-b border-gray-100 dark:border-zinc-800 p-6 flex items-center justify-between z-10">
            <!-- Back to Main Portfolio inside modal -->
            <a href="https://your-main-portfolio-url.com" class="p-3 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 border border-gray-200 dark:border-zinc-700">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <h2 id="modal-title" class="text-2xl font-bold uppercase flex-1 text-center">Project Title</h2>
            <button onclick="closeModal()" class="p-3 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 border border-gray-200 dark:border-zinc-700">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div id="modal-content" class="p-8 max-w-6xl mx-auto"></div>
    </div>

    <script>
        let projectsData = [];
        let recentsData = [];
        let currentRecentIndex = 0;
        let activeFilter = 'All';
        let slideInterval;
        const SLIDE_DURATION = 5000;

        function showLoading() {
            document.getElementById('projects-list').innerHTML = `<div class="py-32 text-center text-gray-400"><div class="spinner mx-auto mb-6"></div><p>Loading projects...</p></div>`;
            document.getElementById('recents-loading').style.display = 'block';
        }

        async function loadData() {
            try {
                const res = await fetch('projects.json');
                projectsData = await res.json();
                // Assume recents are part of projects.json or separate json — add if needed
                renderFilters();
                renderProjects();
                document.getElementById('recents-loading').style.display = 'none';
                renderRecents();
                startAutoSlide();
            } catch (err) {
                console.error(err);
                document.getElementById('projects-list').innerHTML = `<div class="py-32 text-center text-red-500">Error loading data: ${err.message}</div>`;
            }
        }

        // (add your full rendering functions for renderFilters, renderProjects, renderRecents, startAutoSlide, openModal, closeModal, toggleTheme, etc. from your original code)

        window.onload = () => {
            initTheme();
            showLoading();
            lucide.createIcons();
            loadData();
        };
    </script>
</body>
</html>
