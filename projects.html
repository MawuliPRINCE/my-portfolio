<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Ismael Asumanu Prince</title>
  <meta name="description" content="Ismael Asumanu Prince — Graphic Designer and Brand Identity Designer based in Ghana.">
  <meta name="author" content="Ismael Asumanu Prince">
  <!-- Open Graph -->
  <meta property="og:title" content="Projects — Ismael Asumanu Prince">
  <meta property="og:description" content="Graphic Designer and Brand Identity Designer based in Ghana.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mawuliprince.github.io/my-portfolio/projects.html">
  <meta property="og:image" content="https://mawuliprince.github.io/my-portfolio/og-image.jpg">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ismael Asumanu Prince — Graphic Designer">
  <meta name="twitter:description" content="Graphic Designer and Brand Identity Designer based in Ghana.">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000'/><text y='.9em' font-size='80' font-family='serif' fill='%23ff4500'>P</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#f5f2ee; --surface:#edeae5; --text:#0f0f0f; --muted:#888;
      --border:#d8d4ce; --accent:#ff4500; --accent-light:#ff450018;
      --card-bg:#fff; --modal-bg:#f5f2ee;
      --sidebar-bg:#0f0f0f; --sidebar-text:#f5f2ee;
    }
    html.dark {
      --bg:#0f0f0f; --surface:#191919; --text:#f0ece6; --muted:#555;
      --border:#2a2a2a; --accent:#ff4500; --accent-light:#ff450015;
      --card-bg:#191919; --modal-bg:#0f0f0f;
      --sidebar-bg:#0a0a0a; --sidebar-text:#f0ece6;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
    /* Download protection */
    img,video{pointer-events:none;-webkit-user-drag:none;}
    *{-webkit-user-select:none;-moz-user-select:none;user-select:none;}
    .modal-description,.modal-info-value{-webkit-user-select:text;user-select:text;}
    .no-scrollbar::-webkit-scrollbar{display:none;}
    .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
    .shell{display:flex;min-height:100vh;}

    /* ── SIDEBAR ── */
    .sidebar{width:36%;max-width:480px;min-width:280px;position:sticky;top:0;height:100vh;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
    .sidebar-header{padding:1.25rem 1.75rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ffffff12;flex-shrink:0;}
    .sidebar-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.15em;opacity:.45;}
    .recents-count{font-size:.6rem;color:var(--accent);letter-spacing:.1em;}
    .slides-wrap{flex:1;position:relative;overflow:hidden;}
    .slide{position:absolute;inset:0;opacity:0;transition:opacity .7s;cursor:pointer;}
    .slide.active{opacity:1;}
    .slide-media{width:100%;height:100%;object-fit:cover;display:block;}
    .slide-placeholder{width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#333;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;}
    .slide-overlay{position:absolute;inset:0;background:linear-gradient(to top,#000000f0 0%,transparent 55%);}
    .slide-info{position:absolute;bottom:0;left:0;right:0;padding:1.75rem;}
    .slide-tag{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.35rem;font-weight:500;}
    .slide-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.04em;line-height:1;color:#fff;margin-bottom:.35rem;}
    .slide-sub{font-size:.75rem;color:#ffffff65;font-weight:300;}
    .slide-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:#ffffff12;border:1px solid #ffffff18;color:#fff;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);transition:background .2s;}
    .slide-nav:hover{background:#ffffff25;}
    .slide-nav.prev{left:.75rem;}
    .slide-nav.next{right:.75rem;}
    .slide-dots{position:absolute;bottom:1.25rem;right:1.75rem;display:flex;gap:.35rem;z-index:10;}
    .dot{width:5px;height:5px;border-radius:50%;background:#ffffff35;cursor:pointer;transition:all .3s;}
    .dot.active{background:var(--accent);width:16px;border-radius:3px;}
    .progress-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);width:0%;z-index:10;}
    .spinner{width:28px;height:28px;border:2px solid #ffffff12;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── MAIN ── */
    .main{flex:1;display:flex;flex-direction:column;min-width:0;}
    .topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:.9rem 1.75rem;display:flex;align-items:center;gap:.75rem;transition:background .3s;}
    .back-btn{font-size:.62rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--border);padding:.4rem .85rem;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:all .15s;font-family:'DM Sans',sans-serif;flex-shrink:0;}
    .back-btn:hover{border-color:var(--accent);color:var(--accent);}
    .topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;flex-shrink:0;}
    .filters{display:flex;gap:.35rem;overflow-x:auto;flex:1;}
    .filters::-webkit-scrollbar{display:none;}
    .filter-btn{font-family:'DM Sans',sans-serif;font-size:.62rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:.38rem .85rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
    .filter-btn:hover{border-color:var(--accent);color:var(--accent);}
    .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .icon-btn{width:36px;height:36px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:.85rem;}
    .icon-btn:hover{border-color:var(--accent);color:var(--accent);}

    /* ── CARDS ── */
    .projects-wrap{padding:1.75rem;display:flex;flex-direction:column;gap:1.25rem;}
    .project-card{background:var(--card-bg);border:1px solid var(--border);cursor:pointer;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;animation:fadeUp .5s ease both;}
    .project-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px #00000012;border-color:var(--accent);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    /* Cover — image or video */
    .card-cover{width:100%;aspect-ratio:16/7;object-fit:cover;display:block;background:var(--surface);}
    .card-cover-video{width:100%;aspect-ratio:16/7;object-fit:cover;display:block;background:var(--surface);pointer-events:none;}
    .card-cover-none{width:100%;aspect-ratio:16/7;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;}

    .card-body{padding:1.25rem 1.5rem 1.5rem;}
    .card-meta{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem;}
    .card-year{font-size:.62rem;font-weight:500;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}
    .card-tag{font-size:.58rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-light);padding:2px 8px;}
    .card-featured{font-size:.58rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;background:var(--accent);color:#fff;padding:2px 8px;}
    .card-title{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.04em;line-height:1;margin-bottom:.4rem;transition:color .15s;}
    .project-card:hover .card-title{color:var(--accent);}
    .card-subtitle{font-size:.8rem;color:var(--muted);font-weight:300;margin-bottom:.85rem;}
    .card-tags{display:flex;flex-wrap:wrap;gap:.3rem;}
    .tag-pill{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--border);color:var(--muted);}
    .card-arrow{float:right;font-size:1rem;color:var(--muted);transition:transform .2s,color .2s;margin-top:-1.4rem;}
    .project-card:hover .card-arrow{transform:translate(3px,-3px);color:var(--accent);}
    .end-marker{text-align:center;padding:2.5rem;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}
    .state-box{padding:4rem 2rem;text-align:center;color:var(--muted);}
    .state-box h3{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.05em;color:var(--text);margin-bottom:.4rem;}
    .state-box p{font-size:.78rem;}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;z-index:200;background:var(--modal-bg);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s;overflow-y:auto;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal-topbar{position:sticky;top:0;z-index:10;background:var(--modal-bg);border-bottom:1px solid var(--border);padding:.9rem 1.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
    .modal-back{font-size:.62rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px solid var(--border);padding:.4rem .9rem;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:all .15s;font-family:'DM Sans',sans-serif;}
    .modal-back:hover{border-color:var(--accent);color:var(--accent);}
    .modal-title-bar{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.1em;}
    .modal-body{max-width:960px;margin:0 auto;width:100%;padding:2.5rem 1.75rem 4rem;}
    .modal-hero{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,7vw,5.5rem);letter-spacing:.03em;line-height:.9;margin-bottom:1.75rem;}
    .modal-meta-row{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;margin-bottom:2rem;padding-bottom:1.75rem;border-bottom:1px solid var(--border);}
    .modal-year{font-size:.62rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
    .modal-tag{font-size:.6rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-light);padding:3px 10px;}
    .modal-action-row{display:flex;gap:.6rem;margin-left:auto;flex-wrap:wrap;}
    .modal-btn{font-size:.62rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:.4rem 1rem;transition:all .15s;display:flex;align-items:center;gap:.35rem;cursor:pointer;background:none;font-family:'DM Sans',sans-serif;}
    .modal-btn:hover{background:var(--accent);color:#fff;}
    .modal-grid{display:grid;grid-template-columns:1fr 280px;gap:2.5rem;margin-bottom:2.5rem;}
    .modal-description{font-size:.95rem;line-height:1.85;font-weight:300;}
    .modal-info-list{display:flex;flex-direction:column;}
    .modal-info-item{padding:.75rem 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:.2rem;}
    .modal-info-label{font-size:.58rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
    .modal-info-value{font-size:.82rem;}
    .modal-tags-wrap{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.3rem;}

    /* Website iframe preview */
    .preview-section{margin-bottom:2.5rem;}
    .section-label{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;color:var(--muted);margin-bottom:.75rem;}
    .preview-frame-wrap{position:relative;width:100%;border:1px solid var(--border);background:var(--surface);}
    .preview-frame-wrap::before{content:'';display:block;padding-top:56.25%;}
    .preview-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}

    /* Gallery */
    .modal-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.85rem;}
    .gallery-item{aspect-ratio:16/10;overflow:hidden;background:var(--surface);border:1px solid var(--border);}
    .gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
    .gallery-item:hover img,.gallery-item:hover video{transform:scale(1.03);}

    @media(max-width:768px){
      .shell{flex-direction:column;}
      .sidebar{width:100%;max-width:100%;height:58vw;min-height:240px;position:relative;}
      .modal-grid{grid-template-columns:1fr;}
      .modal-hero{font-size:2.5rem;}
      .projects-wrap{padding:1rem;}
      .topbar{padding:.75rem 1rem;flex-wrap:wrap;}
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.95);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox-media {
      max-width: 92vw; max-height: 88vh;
      object-fit: contain; display: block;
      box-shadow: 0 0 60px #00000080;
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      width: 40px; height: 40px; border-radius: 50%;
      background: #fff; border: none; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s; z-index: 10;
    }
    .lightbox-close:hover { background: var(--accent); color: #fff; }
    .gallery-item { cursor: pointer; }
  </style>
</head>
<body>

<div class="shell">

  <!-- RECENTS SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">Recents</span>
      <span class="recents-count" id="recents-count"></span>
    </div>
    <div class="slides-wrap" id="slides-wrap">
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"><div class="spinner"></div></div>
    </div>
    <button class="slide-nav prev" onclick="prevSlide()">&#8592;</button>
    <button class="slide-nav next" onclick="nextSlide()">&#8594;</button>
    <div class="slide-dots" id="slide-dots"></div>
    <div class="progress-bar" id="progress-bar"></div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <a href="index.html" class="back-btn">&#8592; Home</a>
      <span class="topbar-title">Projects</span>
      <div class="filters no-scrollbar" id="filters"></div>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">&#9790;</button>
    </div>
    <div class="projects-wrap" id="projects-wrap">
      <div class="state-box">
        <div class="spinner" style="margin:0 auto 1rem;border-color:var(--border);border-top-color:var(--accent);"></div>
        <p>Loading projects…</p>
      </div>
    </div>
    <div class="end-marker">— End of list —</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-topbar">
    <button class="modal-back" onclick="closeModal()">&#8592; Back</button>
    <span class="modal-title-bar" id="modal-title"></span>
    <button class="icon-btn" onclick="closeModal()">&#10005;</button>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div>

<script>
  const JSON_URL = 'https://raw.githubusercontent.com/MawuliPRINCE/my-portfolio/main/projects.json';
  const SLIDE_MS = 5000;

  let allProjects = [], projectsOnly = [], filtered = [], recents = [];
  let activeFilter = 'All';
  let currentSlide = 0, rafId = null, progressStart = null;

  // ── BOOT ──────────────────────────────────────────────
  window.onload = async () => {
    initTheme();
    try {
      const res = await fetch(JSON_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error();
      allProjects = await res.json();

      // KEY FIX: recents are SEPARATE — they do NOT appear in the projects list
      recents      = allProjects.filter(p => p.isRecent);
      projectsOnly = allProjects.filter(p => !p.isRecent);
      filtered     = [...projectsOnly];

      renderFilters();
      renderProjects();
      renderRecents();
    } catch(e) {
      document.getElementById('projects-wrap').innerHTML = `<div class="state-box"><h3>Could not load</h3><p>Check that projects.json exists in your repo.</p></div>`;
      document.getElementById('slides-wrap').innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#ffffff15;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;">No data</div>`;
    }
  };

  // ── THEME ─────────────────────────────────────────────
  function initTheme() {
    document.documentElement.className = localStorage.getItem('theme') || 'light';
  }
  function toggleTheme() {
    const dark = document.documentElement.classList.contains('dark');
    document.documentElement.className = dark ? 'light' : 'dark';
    localStorage.setItem('theme', dark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = dark ? '☾' : '☀';
  }

  // ── FILTERS ───────────────────────────────────────────
  function renderFilters() {
    const tags = ['All', ...new Set(projectsOnly.flatMap(p => p.tags || []))];
    document.getElementById('filters').innerHTML = tags.map(t =>
      `<button class="filter-btn ${t===activeFilter?'active':''}" onclick="setFilter('${esc(t)}')">${esc(t)}</button>`
    ).join('');
  }

  function setFilter(tag) {
    activeFilter = tag;
    filtered = tag === 'All' ? [...projectsOnly] : projectsOnly.filter(p => p.tags?.includes(tag));
    renderFilters();
    renderProjects();
  }

  // ── PROJECTS ──────────────────────────────────────────
  function renderProjects() {
    const wrap = document.getElementById('projects-wrap');
    if (!filtered.length) {
      wrap.innerHTML = `<div class="state-box"><h3>Nothing here</h3><p>No projects match this filter.</p></div>`;
      return;
    }
    wrap.innerHTML = filtered.map((p, i) => {
      const cover = getCover(p);
      const isVideoCover = cover && isVideoUrl(cover);
      return `
        <div class="project-card" onclick="openModal('${esc(p.id)}')" style="animation-delay:${i*0.065}s">
          ${cover
            ? isVideoCover
              ? `<video class="card-cover-video" src="${esc(cover)}" muted loop autoplay playsinline></video>`
              : `<img class="card-cover" src="${esc(cover)}" alt="${esc(p.title)}" loading="lazy"/>`
            : `<div class="card-cover-none">No Image</div>`}
          <div class="card-body">
            <div class="card-meta">
              ${p.year ? `<span class="card-year">${esc(p.year)}</span>` : ''}
              ${p.tags?.[0] ? `<span class="card-tag">${esc(p.tags[0])}</span>` : ''}
              ${p.isFeatured ? `<span class="card-featured">Featured</span>` : ''}
            </div>
            <div class="card-title">${esc(p.title || 'Untitled')}</div>
            ${p.subtitle ? `<div class="card-subtitle">${esc(p.subtitle)}</div>` : ''}
            <div class="card-tags">${(p.tags||[]).slice(1).map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}</div>
            <span class="card-arrow">&#8599;</span>
          </div>
        </div>`;
    }).join('');
  }

  // Returns the cover URL for a project
  function getCover(p) {
    if (!p.media?.length) return null;
    return p.media[p.coverIndex ?? 0]?.url || p.media[0]?.url || null;
  }

  // Detects video URLs — Cloudinary videos AND common extensions
  function isVideoUrl(url) {
    return /\.(mp4|webm|mov|ogg)(\?|$)/i.test(url) || url.includes('/video/upload/');
  }

  // ── RECENTS SLIDER ────────────────────────────────────
  function renderRecents() {
    const wrap     = document.getElementById('slides-wrap');
    const dotsWrap = document.getElementById('slide-dots');
    const countEl  = document.getElementById('recents-count');

    if (!recents.length) {
      wrap.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#ffffff18;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;">No recents yet</div>`;
      return;
    }

    countEl.textContent = recents.length + ' items';

    wrap.innerHTML = recents.map((p, i) => {
      const cover  = getCover(p);
      const isVid  = cover && isVideoUrl(cover);
      return `
        <div class="slide ${i===0?'active':''}" onclick="openModal('${esc(p.id)}')">
          ${cover
            ? isVid
              ? `<video class="slide-media" src="${esc(cover)}" muted loop autoplay playsinline></video>`
              : `<img class="slide-media" src="${esc(cover)}" alt="${esc(p.title)}" loading="lazy"/>`
            : `<div class="slide-placeholder">No Image</div>`}
          <div class="slide-overlay"></div>
          <div class="slide-info">
            ${p.tags?.[0] ? `<div class="slide-tag">${esc(p.tags[0])}</div>` : ''}
            <div class="slide-title">${esc(p.title || 'Untitled')}</div>
            ${p.subtitle ? `<div class="slide-sub">${esc(p.subtitle)}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    dotsWrap.innerHTML = recents.map((_,i) =>
      `<div class="dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`
    ).join('');

    const sb = document.getElementById('sidebar');
    sb.addEventListener('mouseenter', () => cancelAnimationFrame(rafId));
    sb.addEventListener('mouseleave', () => {
      const pct = parseFloat(document.getElementById('progress-bar')?.style.width || 0);
      progressStart = performance.now() - (pct / 100 * SLIDE_MS);
      animateProgress();
    });

    resetProgress();
  }

  function goSlide(i) {
    document.querySelectorAll('.slide')[currentSlide]?.classList.remove('active');
    document.querySelectorAll('.dot')[currentSlide]?.classList.remove('active');
    currentSlide = ((i % recents.length) + recents.length) % recents.length;
    document.querySelectorAll('.slide')[currentSlide]?.classList.add('active');
    document.querySelectorAll('.dot')[currentSlide]?.classList.add('active');
    resetProgress();
  }
  function prevSlide() { goSlide(currentSlide - 1); }
  function nextSlide() { goSlide(currentSlide + 1); }
  function resetProgress() {
    cancelAnimationFrame(rafId);
    if (recents.length <= 1) return;
    progressStart = performance.now();
    animateProgress();
  }
  function animateProgress() {
    const pct = Math.min(((performance.now() - progressStart) / SLIDE_MS) * 100, 100);
    const bar = document.getElementById('progress-bar');
    if (bar) bar.style.width = pct + '%';
    if (pct >= 100) { goSlide(currentSlide + 1); return; }
    rafId = requestAnimationFrame(animateProgress);
  }

  // ── MODAL ─────────────────────────────────────────────
  function openModal(id) {
    const p = allProjects.find(x => x.id === id);
    if (!p) return;

    document.getElementById('modal-title').textContent = p.title || 'Project';
    const media      = (p.media || []).filter(m => m.url);
    const hasPreview = !!p.previewUrl;
    const hasLink    = !!p.link;

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-hero">${esc(p.title || 'Untitled')}</div>

      <div class="modal-meta-row">
        ${p.year ? `<span class="modal-year">${esc(p.year)}</span>` : ''}
        ${(p.tags||[]).map(t=>`<span class="modal-tag">${esc(t)}</span>`).join('')}
        <div class="modal-action-row">
          ${hasPreview ? `<button class="modal-btn" onclick="togglePreview()">&#9634; Preview Site</button>` : ''}
          ${hasLink    ? `<a class="modal-btn" href="${esc(p.link)}" target="_blank" rel="noopener">&#8599; View Live</a>` : ''}
        </div>
      </div>

      ${hasPreview ? `
        <div class="preview-section" id="preview-section" style="display:none;">
          <p class="section-label">Website Preview</p>
          <div class="preview-frame-wrap">
            <iframe class="preview-iframe" id="preview-iframe"
              src=""
              loading="lazy"
              sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox">
            </iframe>
          </div>
        </div>
        <script>
          window._previewUrl = "${esc(p.previewUrl)}";
        <\/script>` : ''}

      <div class="modal-grid">
        <div>
          ${p.description
            ? `<p class="modal-description">${esc(p.description).replace(/\n/g,'<br/>')}</p>`
            : `<p class="modal-description" style="opacity:.3">No description added.</p>`}
        </div>
        <div class="modal-info-list">
          ${p.subtitle ? `<div class="modal-info-item"><span class="modal-info-label">Role</span><span class="modal-info-value">${esc(p.subtitle)}</span></div>` : ''}
          ${p.year     ? `<div class="modal-info-item"><span class="modal-info-label">Year</span><span class="modal-info-value">${esc(p.year)}</span></div>` : ''}
          ${p.tags?.length ? `
            <div class="modal-info-item">
              <span class="modal-info-label">Tags</span>
              <div class="modal-tags-wrap">${p.tags.map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}</div>
            </div>` : ''}
        </div>
      </div>

      ${media.length ? `
        <p class="section-label">Gallery</p>
        <div class="modal-gallery">
          ${media.map((m,mi) => {
            const isVid = m.type === 'video' || isVideoUrl(m.url);
            const mtype = isVid ? 'video' : 'image';
            return `<div class="gallery-item" onclick="openLightbox('${esc(m.url)}','${mtype}')" style="cursor:pointer;">
              ${isVid
                ? `<video src="${esc(m.url)}" muted loop playsinline autoplay></video>`
                : `<img src="${esc(m.url)}" alt="" loading="lazy"/>`}
            </div>`;
          }).join('')}
        </div>` : ''}
    `;

    document.getElementById('modal').classList.add('open');
    document.getElementById('modal').scrollTop = 0;
    document.body.style.overflow = 'hidden';
  }

  function togglePreview() {
    const section = document.getElementById('preview-section');
    const iframe  = document.getElementById('preview-iframe');
    if (!section) return;
    if (section.style.display === 'none') {
      section.style.display = 'block';
      iframe.src = window._previewUrl || '';
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      section.style.display = 'none';
      iframe.src = '';
    }
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
    // Stop iframe when closing
    const iframe = document.getElementById('preview-iframe');
    if (iframe) iframe.src = '';
  }

  // ── DOWNLOAD PROTECTION ─────────────────────────
  // Block right-click context menu
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Block keyboard shortcuts + Escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeLightbox({target:document.getElementById('lightbox')}); return; }
    if ((e.ctrlKey||e.metaKey) && ['s','u','p'].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.key === 'F12') e.preventDefault();
    if ((e.ctrlKey||e.metaKey) && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())) e.preventDefault();
  });

  // Block drag of images and videos
  document.addEventListener('dragstart', e => {
    if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') e.preventDefault();
  });


  // ── LIGHTBOX ────────────────────────────────────
  function openLightbox(url, type) {
    const inner = document.getElementById('lightbox-inner');
    if (type === 'video') {
      inner.innerHTML = `<video class="lightbox-media" src="${url}" controls autoplay loop muted playsinline></video>`;
    } else {
      inner.innerHTML = `<img class="lightbox-media" src="${clOpt(url)}" alt=""/>`;
    }
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
    const lb = document.getElementById('lightbox');
    lb.classList.remove('open');
    document.getElementById('lightbox-inner').innerHTML = '';
    document.body.style.overflow = '';
  }
  // Cloudinary auto-optimization — cuts image size 60-70%
  function clOpt(url) {
    if (!url) return url;
    if (url.includes('res.cloudinary.com') && url.includes('/upload/') && !url.includes('q_auto')) {
      return url.replace('/upload/', '/upload/q_auto,f_auto,w_auto/');
    }
    return url;
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
  <div id="lightbox-inner"></div>
</div>
</body>
