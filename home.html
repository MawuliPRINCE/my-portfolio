<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ismael Asumanu Prince - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        html {
            scroll-behavior: smooth; /* For smooth scrolling to anchors */
        }

        body {
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(10px, 2vw, 20px) clamp(20px, 4vw, 40px);
            background-color: #fff;
            color: #000;
            transition: background-color 0.3s, color 0.3s;
            z-index: 1000;
        }

        .logo {
            color: #ff4500; /* Orange */
            font-size: clamp(18px, 2vw + 0.5rem, 24px);
            font-weight: 700;
            text-transform: none; /* Changed to none to allow title case */
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: clamp(10px, 2vw, 20px);
        }

        .theme-toggle,
        .hamburger {
            font-size: clamp(18px, 2vw + 0.5rem, 24px);
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
            transition: color 0.3s;
        }

        .theme-toggle:hover,
        .hamburger:hover {
            color: #ff4500;
        }

        /* Menu */
        .menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: clamp(250px, 50vw, 300px);
            height: 100vh;
            background-color: #fff;
            color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: right 0.3s;
            z-index: 999;
        }

        .menu.open {
            right: 0;
        }

        .menu ul {
            list-style: none;
            text-align: center;
        }

        .menu li {
            margin: clamp(10px, 2vw, 20px) 0;
        }

        .menu a {
            color: inherit;
            text-decoration: none;
            font-size: clamp(16px, 2vw + 0.5rem, 20px);
            transition: color 0.3s;
        }

        .menu a:hover {
            color: #ff4500;
        }

        /* Hero Section */
        .hero {
            position: relative; /* For background video/image positioning */
            min-height: 80vh; /* Adjusted to create space matching screenshot */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000; /* Default black, as in screenshot */
            /* For custom background image placeholder: uncomment and replace URL */
            /* background: url('your-custom-image.jpg') no-repeat center center/cover; */
            text-align: center;
            padding: clamp(80px, 10vh, 100px) clamp(10px, 2vw, 20px) clamp(10px, 2vw, 20px);
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .text-container {
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent dark layer */
            backdrop-filter: blur(10px); /* Glassy blur effect */
            padding: clamp(10px, 2vw, 20px) clamp(20px, 4vw, 40px);
            border-radius: 10px;
            z-index: 1; /* Ensure it's above the background media */
            max-width: 80%;
        }

        .hero h1 {
            font-size: clamp(32px, 5vw + 1rem, 48px);
            font-weight: 700;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s, transform 1s;
            white-space: nowrap; /* Force name on one line */
        }

        .hero h1.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .hero p {
            font-size: clamp(16px, 2vw + 0.5rem, 18px);
            color: #ccc; /* Made lighter for better legibility */
            margin-top: 10px;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s 0.3s, transform 1s 0.3s;
            white-space: nowrap; /* Force title on one line */
        }

        .hero p.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Separator */
        .separator {
            width: 100%;
            height: 1px;
            background-color: #fff;
        }

        /* Footer */
        footer {
            padding: clamp(40px, 6vw, 60px) clamp(20px, 4vw, 40px);
            background-color: #000;
            color: #fff;
            text-align: left;
            transition: background-color 0.3s, color 0.3s;
            position: relative; /* For go-to-top positioning */
        }

        footer h2 {
            font-size: clamp(28px, 4vw + 1rem, 36px);
            font-weight: 700;
        }

        .underline {
            width: clamp(80px, 10vw, 100px);
            height: 2px;
            background-color: #ff4500; /* Red/Orange */
            margin: clamp(5px, 1vw, 10px) 0;
        }

        footer p {
            font-size: clamp(14px, 1.5vw + 0.5rem, 16px);
            color: #ddd; /* Lighter gray for better visibility in dark bg */
            max-width: clamp(400px, 60vw, 600px);
            margin-bottom: clamp(20px, 4vw, 40px);
            transition: color 0.3s;
        }

        .social-icons {
            display: flex;
            gap: clamp(10px, 2vw, 20px);
            align-items: center;
        }

        .social-icon {
            font-size: clamp(18px, 2vw + 0.5rem, 24px);
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-icon:hover {
            color: #ff4500;
        }

        .go-to-top {
            position: absolute;
            right: clamp(20px, 4vw, 40px);
            bottom: clamp(40px, 6vw, 60px);
            font-size: clamp(18px, 2vw + 0.5rem, 24px);
            color: #ff4500;
            cursor: pointer;
            transition: color 0.3s;
        }

        .go-to-top:hover {
            color: #ff4500; /* Already orange, but for consistency */
        }

        /* Dark Mode */
        body.dark header {
            background-color: #000;
            color: #fff;
        }

        body.dark .menu {
            background-color: #000;
            color: #fff;
        }

        body.dark footer {
            background-color: #fff;
            color: #000;
        }

        body.dark .social-icon {
            color: #000;
        }

        body.dark .social-icon:hover {
            color: #ff4500;
        }

        body.dark footer p {
            color: #333; /* Darker gray for better visibility on white bg */
        }

        /* Light Mode is default: header white, footer dark */

        /* Additional Responsive Adjustments */
        @media (max-width: 768px) {
            .menu {
                width: 100%; /* Full width on mobile */
            }

            .text-container {
                max-width: 90%;
            }

            footer {
                text-align: center; /* Center footer text on small screens */
            }

            .social-icons {
                justify-content: center;
            }

            .go-to-top {
                right: 50%;
                transform: translateX(50%);
                bottom: clamp(20px, 4vw, 40px);
            }
        }

    </style>
</head>
<body class="light"> <!-- Start in light mode: header white, footer dark -->

    <header>
        <div class="logo">Prince</div>
        <div class="nav-icons">
            <button class="theme-toggle"><i class="fas fa-lightbulb"></i></button>
            <button class="hamburger"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <nav class="menu">
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="index.html">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <!-- For custom background video placeholder: uncomment and replace src -->
        <!--
        <video autoplay muted loop class="bg-video">
            <source src="your-custom-video.mp4" type="video/mp4">
        </video>
        -->
        <div class="text-container">
            <h1>Ismael Asumanu Prince</h1>
            <p>Graphic Designer / Brand Identity Designer</p>
        </div>
    </section>

    <div class="separator"></div>

    <footer id="contact">
        <h2>Let's Connect</h2>
        <div class="underline"></div>
        <p>Ready to start your next project or want to collaborate? I'm always open to new opportunities. Connect with me instantly via email or through social media.</p>
        <div class="social-icons">
            <a href="#" class="social-icon"><i class="fas fa-envelope"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-dribbble"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-behance"></i></a>
        </div>
        <div class="go-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><i class="fas fa-arrow-up"></i></div>
    </footer>

    <script>
        // Theme Toggle
        const themeToggle = document.querySelector('.theme-toggle');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                body.classList.add('dark');
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
            }
        });

        // Hamburger Menu
        const hamburger = document.querySelector('.hamburger');
        const menu = document.querySelector('.menu');

        hamburger.addEventListener('click', () => {
            menu.classList.toggle('open');
        });

        // Scroll Triggered Animation (re-triggers on scroll in/out)
        const heroElements = document.querySelectorAll('.hero h1, .hero p');

        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                } else {
                    entry.target.classList.remove('visible');
                }
            });
        }, { threshold: 0.1 });

        heroElements.forEach(el => observer.observe(el));
    </script>

</body>
</html>
